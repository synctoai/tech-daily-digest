name: Secret Scan (gitleaks)

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    # 每天 08:20 Asia/Shanghai ~= 00:20 UTC
    - cron: '20 0 * * *'

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
